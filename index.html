<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KZStore Rebel City</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            overflow-x: hidden;
            background: repeating-linear-gradient(90deg, #00ffff22 0px, #00ffff22 2px, transparent 2px, transparent 40px);
            animation: movebg 6s linear infinite;
        }

        @keyframes movebg {
            0% { background-position: 0 0; }
            100% { background-position: 200px 0; }
        }

        /* --- INTRO GEDEIN --- */
        #intro {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            animation: fadeout 2s ease 3s forwards;
        }

        #intro img {
            width: 320px; /* INTRO JADI GEDE SANGAR */
            animation: logoanim 3s ease;
            filter: drop-shadow(0 0 30px cyan);
        }

        @keyframes logoanim {
            0% { transform: scale(0.5) rotate(-30deg); opacity: 0; }
            50% { transform: scale(1.1) rotate(5deg); opacity: 1; }
            100% { transform: scale(1); }
        }

        @keyframes fadeout {
            to { opacity: 0; visibility: hidden; }
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 0;
        }

        body * { position: relative; z-index: 1; }

        /* --- TULISAN JUDUL GEDE --- */
        h1 {
            margin-top: 25px;
            font-size: 48px; /* JUDUL GEDE BANGET */
            letter-spacing: 5px;
            text-shadow: 0 0 25px cyan, 0 0 10px white;
            text-transform: uppercase;
        }

        /* --- CONTAINER COMPACT (2 KOLOM) --- */
        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
            margin-top: 10px;
        }

        .card {
            background: rgba(0,0,0,0.85);
            border: 1.5px solid cyan;
            border-radius: 12px;
            padding: 8px; /* PADDING DIKECILIN BIAR COMPACT */
            box-shadow: 0 0 15px rgba(0,255,255,0.4);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        /* --- TULISAN PRODUK & HARGA DIBESARIN --- */
        .card h2 {
            font-size: 16px; /* TULISAN JUDUL PRODUK GEDE */
            margin: 5px 0;
            font-weight: bold;
            line-height: 1.1;
        }

        .card p {
            font-size: 18px; /* HARGA GEDE BIAR JELAS */
            color: #00ffff;
            font-weight: 900;
            margin: 2px 0;
            text-shadow: 0 0 5px cyan;
        }

        button {
            padding: 12px;
            margin-top: 5px;
            border: none;
            border-radius: 6px;
            background: #00ffcc;
            font-size: 13px; /* TEKS TOMBOL GEDE */
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            color: black;
        }

        /* --- POPUP --- */
        .popup {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
        }

        .popup-content {
            margin: 80px auto;
            width: 90%;
            max-width: 350px;
        }

        .popup img {
            width: 100%;
            border: 3px solid cyan;
            border-radius: 15px;
        }

        .close {
            font-size: 50px;
            color: red;
            font-weight: bold;
            cursor: pointer;
            position: absolute;
            top: 15px;
            right: 25px;
        }
    </style>
</head>

<body>

    <div id="intro">
        <img src="kocakjir.png">
        <h2 style="color:cyan; font-size: 22px; letter-spacing: 3px; margin-top: 20px;">KZSTORE REBEL CITY</h2>
    </div>

    <h1>KZStore</h1>

    <div class="container">
        <div class="card">
            <img src="tobaco.png" class="product-img">
            <h2>Backpack Tobaco</h2>
            <p>15K</p> <button onclick="beli('qris15.jpg')">BELI</button>
        </div>

        <div class="card">
            <img src="ak47.png" class="product-img">
            <h2>Backpack AK47</h2>
            <p>15K</p>
            <button onclick="beli('qris20.jpg')">BELI</button>
        </div>

        <div class="card">
            <img src="awp.png" class="product-img">
            <h2>Backpack AWP</h2>
            <p>25K</p>
            <button onclick="beli('qris25.jpg')">BELI</button>
        </div>
    </div>

    <div class="popup" id="popup">
        <span class="close" onclick="tutup()">&times;</span>
        <div class="popup-content">
            <img id="qrisgambar">
            <p style="margin-top: 20px; font-size: 20px; font-weight: bold;">SCAN SEKARANG!</p>
        </div>
    </div>

    <script>
        function beli(gambar){
            document.getElementById("popup").style.display="block";
            document.getElementById("qrisgambar").src = gambar;
        }
        function tutup(){
            document.getElementById("popup").style.display="none";
        }
    </script>

</body>
</html>
